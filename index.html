<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saiten-Berater: Finde deine perfekte Tennissaite</title>
    <style>
        :root {
            --primary: #10b981; /* Tennis-Grün */
            --primary-dark: #059669;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-light);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .progress-bar {
            height: 6px;
            background-color: #e5e7eb;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: none;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
            font-weight: 500;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background-color: #f0fdf4;
        }

        .result-card {
            text-align: center;
        }

        .string-title {
            font-size: 28px;
            color: var(--primary-dark);
            margin: 20px 0 10px 0;
            font-weight: 800;
        }

        .string-type {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .string-desc {
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 15px;
            text-align: left;
        }

        /* Formular Styling */
        .lead-form {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 20px;
            border-radius: 12px;
            margin-top: 25px;
            text-align: left;
        }

        .lead-form h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-light);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--primary-dark);
        }

        .restart-link {
            display: inline-block;
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-light);
            text-decoration: underline;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <h1 id="quiz-title">Saiten-Berater</h1>
        <div class="subtitle">Finde in wenigen Klicks dein perfektes Setup</div>
        <div class="progress-bar">
            <div id="progress" class="progress"></div>
        </div>
        <div id="question" class="question">Frage lädt...</div>
        <div id="options" class="options-list"></div>
    </div>

    <div id="result-screen" class="result-card hidden">
        <h1>Dein Ergebnis:</h1>
        <div id="result-title" class="string-title">Saitenname</div>
        <div id="result-type" class="string-type">Materialtyp</div>
        <div id="result-desc" class="string-desc">Beschreibung</div>
        
        <div class="lead-form">
            <h3>Ergebnis an Steffen senden</h3>
            
            <form action="https://formsubmit.co/swbesaitung@gmail.com" method="POST">
                
                <input type="hidden" name="Empfohlene Saite" id="hidden-string">
                <input type="hidden" name="Gewählte Antworten" id="hidden-answers">
                
                <div class="form-group">
                    <label for="playerName">Dein Name:</label>
                    <input type="text" id="playerName" name="Spieler-Name" required placeholder="Vorname">
                </div>
                <div class="form-group">
                    <label for="playerMessage">Optionale Nachricht / Wunsch-Besaitungshärte:</label>
                    <textarea id="playerMessage" name="Nachricht" rows="2" placeholder="z.B. 'Bitte als Hybrid aufziehen' oder 'Härte: 24/23kg'"></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Anfrage abschicken</button>
            </form>
        </div>

        <div class="restart-link" onclick="restartQuiz()">Test neu starten</div>
    </div>
</div>

<script>
   const questions = [
    {
    question: "Wie lange spielst Du schon Tennis bzw. wie schätzt Du Dein Spielniveau ein?",
    options: [
        { text: "Einsteiger*in / Gelegenheitsspieler*in – Ich lerne noch die Technik oder spiele nur ein paar Mal im Jahr.", scores: { polytech: 0, msv: 2, babolat: 5 } },
        { text: "Fortgeschritten – Ich spiele regelmäßig im Verein, beherrsche die Grundschläge und möchte mich weiterentwickeln", scores: { polytech: 3, msv: 5, babolat: 1 } },
        { text: "Medenspieler*in / Turnierspieler*in – Ich spiele viel, treffe den Ball hart und ziehe meine Schläge voll durch.", scores: { polytech: 5, msv: 2, babolat: 0 } }
        ]
    },
    {
        question: "Was ist dir bei deinem Spiel am allerwichtigsten?",
        options: [
            { text: "Maximale Armschonung & weiches Gefühl. Es hilft mir auch, wenn die Saite mir etwas Power schenkt.", scores: { polytech: 1, msv: 4, babolat: 5 } },
            { text: "Eine Mischung aus Armschonung, Power und auch etwas Spin.", scores: { polytech: 2, msv: 4, babolat: 1 } },
            { text: "Die Ballkontrolle und Spin einer Polyester-Saite, aber etwas weicher und schonender. Mit Power brauche ich weniger Hilfe von der Saite", scores: { polytech: 5, msv: 3, babolat: 1 } }
        ]
    },
    {
        question: "Hattest du in der Vergangenheit schon mal Probleme mit einem Tennisarm (Schmerzen am/im Ellenbogen)?",
        options: [
            { text: "Ja, mein Arm ist sehr empfindlich. Ich brauche maximalen Dämpfungskomfort.", scores: { polytech: 1, msv: 4, babolat: 5 } },
            { text: "Ab und zu zwickt es, weshalb ich eine elastische Faserstruktur bevorzuge.", scores: { polytech: 2, msv: 4, babolat: 4 } },
            { text: "Nein, überhaupt nicht. Ich spiele ohne Schmerzen - yay!", scores: { polytech: 5, msv: 3, babolat: 3 } }
        ]
    },
    {
        question: "Wie steht es um deinen Saitenverschleiß? Wie oft reißt dir eine Saite?",
        options: [
            { text: "Sehr selten bis nie. Ich mag es, wenn die Saite lange die Spannung hält und ich nicht so häufig neu besaiten lassen muss.", scores: { polytech: 1, msv: 4, babolat: 5 } },
            { text: "Gelegentlich. Ich versuche schon viel Topspin zu spielen, das sollte die Saite aushalten", scores: { polytech: 4, msv: 4, babolat: 2 } },
            { text: "Sehr häufig. Ich suche die langlebige Reißfestigkeit einer Polyester-Saite.", scores: { polytech: 5, msv: 2, babolat: 1 } }
        ]
    },
    {
        question: "Wie findest Du es, wenn die Saiten nicht von selbst zurückspringen nach dem Ballwechsel?",
        options: [
            { text: "Das finde ich nicht gut, die Saiten sollten von selbst immer schön gerade aussehen", scores: { polytech: 5, msv: 1, babolat: 1 } },
            { text: "Es ist mir eigentlich egal, aber nach jedem Punkt möchte ich die nicht zurückschieben müssen", scores: { polytech: 4, msv: 2, babolat: 1 } },
            { text: "Das ist mir wirklich vollkommen egal. Ich kann die Saiten nach dem Ballwechsel selber wieder in Form bringen", scores: { polytech: 3, msv: 5, babolat: 5 } }
        ]
    },
    {
        question: "Bevorzugst du eine eher hohe Besaitungshärte (mehr Kontrolle) oder eine geringere Härte (mehr Power)?",
        options: [
            { text: "Eher härter bespannt (z. B. 25-26 kg) – Ich will maximale Kontrolle, da ich selbst genug Power generiere.", scores: { polytech: 0, msv: 0, babolat: 0 } },
            { text: "Mittelmaß (z. B. 23-24 kg) – Eine ausgewogene Mischung aus Kontrolle, Armschonung und Ballbeschleunigung.", scores: { polytech: 0, msv: 0, babolat: 0 } },
            { text: "Eher weicher bespannt (z. B. 21-22 kg) – Ich suche den Trampolin-Effekt für maximale, mühelose Power.", scores: { polytech: 0, msv: 0, babolat: 0 } }
        ]
    }
];

    const strings = {
        polytech: {
            title: "Topspin Polytech Evo II (1,25)",
            type: "Weiches Co-Polyester (Monofilament)",
            desc: "Diese supergünstige Saite bietet Haltbarkeit und die Präzision einer Polyester-Saite, aber schont trotzdem den Arm. Mit einer geringen statischen Steifigkeit von 0,73 kg/mm ist sie eine der weicheren Polys am Markt. Guter Energy Return - und Spin dank Snapback! Um davon zu profitieren sollte man den eigenen Schläger schon recht schnell schwingen können, da die Saite wenig Power schenkt. Außerdem verlieren Polyester-Saiten relativ schnell an Spannung (aber reißen dafür fast nie). Materialkosten ca. 1,50€ für den Schläger."
        },
        msv: {
            title: "MSV Spin Plus (1,30)",
            type: "Komfort-Multifilament (Polyamid)",
            desc: "Meine Saite der Wahl :P Elastischer Komfort für deinen Arm, trotzdem Hilfe für den Topspin. Die MSV Spin Plus ist eine echte Multifilament-Saite aus Polyamid, die dank ihrer speziellen Außenwicklungen und Gleitbeschichtung einen brauchabren Spin erzeugt. Weniger als bei Polyester aber dafür etwas mehr Power! Mir reißt diese Saite fast nie, aber sie ist schon anfälliger als bspw. Polyester. Dafür hält die Spannung länger! Nach langen Ballwechseln musst du manchmal die Saiten wieder mit der Hand geraderücken (vor allem, wenn wir mit der Besaitungshärte eher runtergehen. Materialkosten ca. 5,70€ für 1 Schläger."
        },
        babolat: {
            title: "Babolat Synthetic Gut",
            type: "Klassisches Nylon (Synthetic Gut)",
            desc: "Budgetschonend dank Spannungshaltung! Die Saite bietet dir ein gutes Spielgefühl, super Eigenbeschleunigung (Power) und hält die Spannung im Vergleich zu Polyester-Saiten extrem stabil. Allerdings reißt sie dafür schnell, wenn du sehr viel Speed und Spin hast und du wirst nach langen Ballwechseln die Saiten öfter mit der Hand geraderücken müssen! Eher für Spieler:innen mit geraden Schlägen, die maximalen Komfort suchen oder gerade erst angefangen haben - dadurch, dass die Saite beim Topspin weniger hilft, kommt es mehr auf deine Technik an ;) <br><br><strong>Hybrid-Tipp:</strong> Perfekt als weiche Quersaite, um die Saiten langlebiger und armschonender zu machen."
        }
    };

    let currentQuestionIndex = 0;
    let userScores = { polytech: 0, msv: 0, babolat: 0 };
    let selectedAnswers = [];

    function loadQuestion() {
        const progressPercent = (currentQuestionIndex / questions.length) * 100;
        document.getElementById('progress').style.width = `${progressPercent}%`;

        if (currentQuestionIndex >= questions.length) {
            showResult();
            return;
        }

        const currentQuestion = questions[currentQuestionIndex];
        document.getElementById('question').textContent = currentQuestion.question;
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        currentQuestion.options.forEach(option => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.textContent = option.text;
            button.onclick = () => handleAnswer(option.text, option.scores);
            optionsContainer.appendChild(button);
        });
    }

    function handleAnswer(text, scores) {
        selectedAnswers.push(`F${currentQuestionIndex+1}: ${text}`);
        for (const string in scores) {
            userScores[string] += scores[string];
        }
        currentQuestionIndex++;
        loadQuestion();
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        let winner = 'polytech';
        if (userScores.msv > userScores.polytech && userScores.msv > userScores.babolat) {
            winner = 'msv';
        } else if (userScores.babolat > userScores.polytech && userScores.babolat > userScores.msv) {
            winner = 'babolat';
        }

        const result = strings[winner];
        document.getElementById('result-title').textContent = result.title;
        document.getElementById('result-type').textContent = result.type;
        document.getElementById('result-desc').innerHTML = result.desc;

        // Daten heimlich in das E-Mail-Formular eintragen
        document.getElementById('hidden-string').value = result.title;
        document.getElementById('hidden-answers').value = selectedAnswers.join(" | ");
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        userScores = { polytech: 0, msv: 0, babolat: 0 };
        selectedAnswers = [];
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
